<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเบิกเงินสำรองจ่าย SWP Venture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background-color: #fff9fb;
            background-image: radial-gradient(#ffdce9 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }
        .character-gradient {
            background: linear-gradient(135deg, #ffafcc 0%, #b388ff 100%);
        }
        .custom-card {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #ffdae9;
            box-shadow: 0 20px 40px -10px rgba(255, 175, 204, 0.2);
            border-radius: 2.5rem;
        }
        
        .table-header {
            background-color: #ffffff;
            border-bottom: 2px solid #f3f4f6;
        }
        .table-header th {
            color: #000000;
            font-weight: 600;
            font-size: 1rem;
            padding: 1.25rem 1rem;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .header-scb { color: #d81b60 !important; }
        .header-kbank { color: #2e6b36 !important; }

        /* จัดระเบียบตัวอักษรในช่องกรอกให้อยู่ตรงกลางเสมอ */
        input, select {
            border: 1px solid #fce4ec;
            padding: 10px 12px;
            border-radius: 12px;
            width: 100%;
            background-color: #fff;
            color: #000;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 0.875rem;
            text-align: center; /* จัดกึ่งกลาง */
            text-align-last: center; /* สำหรับ select */
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff85b3;
            box-shadow: 0 0 0 4px rgba(255, 133, 179, 0.15);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            margin-left: -15px;
        }

        .btn-add {
            background: linear-gradient(to right, #ff85b3, #9d65ff);
            color: white;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(255, 133, 179, 0.4);
        }
        .btn-update {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }
        .scb-col { background-color: #fcfaff; }
        .kbank-col { background-color: #f6fff9; }

        .status-pending { color: #ef4444; font-weight: bold; }
        .status-approved { color: #10b981; font-weight: bold; }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            max-width: 95%;
            width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .report-header {
            background-color: #777777;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 1.25rem;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .report-table th, .report-table td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
            color: #000;
        }
        .report-table th {
            background-color: #f2f2f2;
            font-weight: 600;
            color: #000;
        }
        .report-scb-header { background-color: #d13d6a !important; color: white !important; }
        .report-kbank-header { background-color: #2e6b36 !important; color: white !important; }
        .report-scb-sum { background-color: #f7c1d1; }
        .report-kbank-sum { background-color: #d1ead4; }
        .report-grand-sum { background-color: #f9cb9c; }

        .btn-summary {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="character-gradient p-8 rounded-t-[2.5rem] flex flex-col md:flex-row justify-between items-center border-b-4 border-white/40 shadow-sm">
            <div class="flex items-center space-x-6">
                <div>
                    <h1 class="text-3xl font-bold text-white drop-shadow-md">ตารางเบิกเงิน</h1>
                    <p class="text-white/90 font-medium tracking-wide italic">สำรองจ่ายรายวัน วันที่ <span id="header-date"></span> SWP Venture</p>
                </div>
            </div>
        </div>

        <div class="custom-card p-6 md:p-8 rounded-b-[2.5rem]">
            <!-- Form -->
            <div id="entryForm" class="bg-pink-50/40 p-5 rounded-[2rem] border border-pink-100/60 mb-10">
                <input type="hidden" id="editIndex" value="-1">
                <div class="flex flex-wrap lg:flex-nowrap gap-3 items-end">
                    <div class="w-full sm:w-[calc(50%-0.75rem)] lg:w-32">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">สถานะ</label>
                        <select id="statusInput">
                            <option value="รออนุมัติ">🔴 รออนุมัติ</option>
                            <option value="อนุมัติ">🟢 อนุมัติ</option>
                        </select>
                    </div>
                    <div class="w-full sm:w-[calc(50%-0.75rem)] lg:w-40">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">วันที่</label>
                        <input type="date" id="dateInput">
                    </div>
                    <!-- ขยายช่องชื่อ-นามสกุล โดยเพิ่ม flex-grow หรือระบุ flex-[1.5] -->
                    <div class="w-full sm:w-full lg:flex-[1.5]">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">ชื่อ-นามสกุล</label>
                        <input type="text" id="nameInput" placeholder="ระบุชื่อ">
                    </div>
                    <div class="w-full sm:w-[calc(50%-0.75rem)] lg:flex-1">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">รายละเอียด</label>
                        <input type="text" id="reasonInput" placeholder="ระบุรายการเบิก">
                    </div>
                    <div class="w-full sm:w-[calc(60%-0.75rem)] lg:w-60">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">ธนาคาร & ยอดเงิน</label>
                        <div class="flex space-x-1">
                            <select id="bankInput" class="w-24">
                                <option value="SCB">SCB</option>
                                <option value="KBANK">KBANK</option>
                            </select>
                            <input type="number" id="amountInput" placeholder="0.00" class="flex-1">
                        </div>
                    </div>
                    <div class="w-full sm:w-[calc(40%-0.75rem)] lg:w-32">
                        <label class="text-[10px] font-bold text-pink-400 uppercase block mb-1 text-center">ผู้แจ้งเบิก</label>
                        <input type="text" id="requesterInput" placeholder="ผู้แจ้ง">
                    </div>
                    <div class="w-full lg:w-auto">
                        <button id="submitBtn" onclick="addEntry()" class="btn-add w-full lg:w-auto px-8 py-[10px] rounded-xl font-bold shadow-sm">บันทึก</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-hidden rounded-[1.5rem] border border-pink-50 shadow-sm bg-white">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse min-w-[900px]">
                        <thead>
                            <tr class="table-header">
                                <th class="p-5">สถานะ</th>
                                <th class="p-5">วันที่</th>
                                <th class="p-5">ชื่อ-นามสกุล</th>
                                <th class="p-5">รายละเอียด</th>
                                <th class="p-5 scb-col border-x border-pink-50 header-scb">SCB</th>
                                <th class="p-5 kbank-col border-x border-pink-50 header-kbank">KBANK</th>
                                <th class="p-5">ผู้แจ้งเบิก</th>
                                <th class="p-5">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-pink-50 text-center">
                        </tbody>
                        <tfoot class="bg-pink-50/20">
                            <tr class="font-bold">
                                <td colspan="4" class="p-6 text-right text-pink-400 italic">ยอดรวมทั้งหมด:</td>
                                <td id="totalSCB" class="p-6 text-center text-purple-600 text-lg border-x border-pink-100">0.00</td>
                                <td id="totalKBANK" class="p-6 text-center text-green-600 text-lg border-x border-pink-100">0.00</td>
                                <td colspan="2" class="p-6 text-center bg-white">
                                    <span class="text-[10px] text-pink-300 block font-normal uppercase tracking-widest">Grand Total</span>
                                    <span class="text-3xl font-bold text-transparent bg-clip-text character-gradient">฿ <span id="grandTotal">0.00</span></span>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div id="emptyState" class="p-20 text-center flex flex-col items-center bg-white">
                    <p class="text-pink-200 font-medium tracking-widest uppercase text-xs">ยังไม่มีข้อมูลในรายการ</p>
                </div>
            </div>

            <div id="summaryActionArea" class="mt-10 flex justify-center hidden">
                <button onclick="openDailySummary()" class="btn-summary flex items-center space-x-3">
                    <span>สรุปข้อมูลรายวัน (Daily Summary)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="reportModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-end mb-2">
                <button onclick="closeModalDirect()" class="text-gray-400 hover:text-red-500">✕</button>
            </div>
            <div class="report-header" id="modalHeaderTitle">สรุปรายการค่าใช้จ่าย SWP Venture</div>
            <div class="mt-4 mb-2 text-md font-semibold text-gray-800 text-center" id="modalDateDisplay"></div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th width="12%">สถานะ</th>
                        <th width="12%">วันที่</th>
                        <th width="20%">ชื่อ-นามสกุล</th>
                        <th width="20%">รายละเอียด</th>
                        <th width="12%" class="report-scb-header">SCB</th>
                        <th width="12%" class="report-kbank-header">KBANK</th>
                        <th width="12%">ผู้แจ้งเบิก</th>
                    </tr>
                </thead>
                <tbody id="modalTableBody"></tbody>
                <tfoot>
                    <tr class="font-bold">
                        <td colspan="4">รวม</td>
                        <td id="modalSumSCB" class="report-scb-sum">0.00</td>
                        <td id="modalSumKBank" class="report-kbank-sum">0.00</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td colspan="5" class="border-none"></td>
                        <td id="modalGrandTotal" class="report-grand-sum font-bold text-lg">0.00</td>
                        <td class="border-none"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        let entries = [];

        window.onload = function() {
            const today = new Date();
            document.getElementById('dateInput').value = today.toISOString().split('T')[0];
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('header-date').innerText = today.toLocaleDateString('th-TH', options);
            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const summaryActionArea = document.getElementById('summaryActionArea');
            tbody.innerHTML = '';
            
            const isEmpty = entries.length === 0;
            emptyState.style.display = isEmpty ? 'flex' : 'none';
            summaryActionArea.classList.toggle('hidden', isEmpty);
            
            let totalSCB = 0, totalKBANK = 0;

            entries.forEach((item, index) => {
                totalSCB += item.scb;
                totalKBANK += item.kbank;

                const row = document.createElement('tr');
                const statusClass = item.status === 'อนุมัติ' ? 'status-approved' : 'status-pending';

                row.innerHTML = `
                    <td class="p-5">
                        <select onchange="updateStatus(${index}, this.value)" class="text-xs border-none bg-transparent ${statusClass}">
                            <option value="รออนุมัติ" ${item.status === 'รออนุมัติ' ? 'selected' : ''}>รออนุมัติ</option>
                            <option value="อนุมัติ" ${item.status === 'อนุมัติ' ? 'selected' : ''}>อนุมัติ</option>
                        </select>
                    </td>
                    <td class="p-5 text-sm text-gray-500">${item.date}</td>
                    <td class="p-5 font-semibold text-gray-800">${item.name}</td>
                    <td class="p-5 text-sm text-gray-600">${item.reason}</td>
                    <td class="p-5 text-center font-bold text-purple-600 scb-col">${item.scb > 0 ? item.scb.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td class="p-5 text-center font-bold text-green-600 kbank-col">${item.kbank > 0 ? item.kbank.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td class="p-5"><span class="bg-pink-50 text-pink-500 px-3 py-1 rounded-full text-[10px] font-bold">${item.requester}</span></td>
                    <td class="p-5 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <button onclick="editEntry(${index})" class="text-yellow-500 hover:scale-110 transition-transform">✎</button>
                            <button onclick="openReportModal(${index})" class="text-blue-500 hover:scale-110 transition-transform">📄</button>
                            <button onclick="deleteEntry(${index})" class="text-red-300 hover:text-red-500 transition-colors">🗑</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalSCB').innerText = totalSCB.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalKBANK').innerText = totalKBANK.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('grandTotal').innerText = (totalSCB + totalKBANK).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function addEntry() {
            const status = document.getElementById('statusInput').value;
            const rawDate = document.getElementById('dateInput').value;
            const name = document.getElementById('nameInput').value;
            const reason = document.getElementById('reasonInput').value;
            const bank = document.getElementById('bankInput').value;
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const requester = document.getElementById('requesterInput').value || '-';
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!name || !reason || amount <= 0) return;

            const dateObj = new Date(rawDate);
            const formattedDate = dateObj.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });

            const newEntry = {
                status, date: formattedDate, rawDate, name, reason,
                scb: bank === 'SCB' ? amount : 0,
                kbank: bank === 'KBANK' ? amount : 0,
                requester
            };

            if (editIndex > -1) { entries[editIndex] = newEntry; cancelEdit(); } 
            else { entries.push(newEntry); }
            
            renderTable();
            clearForm();
        }

        function editEntry(index) {
            const item = entries[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('statusInput').value = item.status;
            document.getElementById('dateInput').value = item.rawDate;
            document.getElementById('nameInput').value = item.name;
            document.getElementById('reasonInput').value = item.reason;
            document.getElementById('requesterInput').value = item.requester;
            document.getElementById('bankInput').value = item.scb > 0 ? 'SCB' : 'KBANK';
            document.getElementById('amountInput').value = item.scb > 0 ? item.scb : item.kbank;
            document.getElementById('submitBtn').innerText = 'อัปเดต';
            document.getElementById('submitBtn').classList.add('btn-update');
        }

        function cancelEdit() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('submitBtn').innerText = 'บันทึก';
            document.getElementById('submitBtn').classList.remove('btn-update');
            clearForm();
        }

        function clearForm() {
            document.getElementById('nameInput').value = '';
            document.getElementById('reasonInput').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('requesterInput').value = '';
        }

        function updateStatus(index, val) { entries[index].status = val; renderTable(); }
        function deleteEntry(index) { entries.splice(index, 1); renderTable(); }

        function openReportModal(index) {
            const item = entries[index];
            const modal = document.getElementById('reportModal');
            const tbody = document.getElementById('modalTableBody');
            
            document.getElementById('modalDateDisplay').innerText = `รายการวันที่: ${item.date}`;
            tbody.innerHTML = `
                <tr>
                    <td style="${item.status === 'อนุมัติ' ? 'color: #10b981;' : 'color: #ef4444;'} font-weight: bold;">${item.status}</td>
                    <td>${item.date}</td>
                    <td class="text-left">${item.name}</td>
                    <td class="text-left">${item.reason}</td>
                    <td>${item.scb > 0 ? item.scb.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td>${item.kbank > 0 ? item.kbank.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                    <td>${item.requester}</td>
                </tr>
            `;
            document.getElementById('modalSumSCB').innerText = item.scb.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('modalSumKBank').innerText = item.kbank.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('modalGrandTotal').innerText = (item.scb + item.kbank).toLocaleString(undefined, {minimumFractionDigits: 2});
            modal.style.display = 'flex';
        }

        function openDailySummary() {
            const modal = document.getElementById('reportModal');
            const tbody = document.getElementById('modalTableBody');
            let totalSCB = 0, totalKBank = 0, htmlRows = '';

            entries.forEach(item => {
                totalSCB += item.scb; totalKBank += item.kbank;
                htmlRows += `
                    <tr>
                        <td style="${item.status === 'อนุมัติ' ? 'color: #10b981;' : 'color: #ef4444;'} font-weight: bold;">${item.status}</td>
                        <td>${item.date}</td>
                        <td class="text-left">${item.name}</td>
                        <td class="text-left">${item.reason}</td>
                        <td>${item.scb > 0 ? item.scb.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                        <td>${item.kbank > 0 ? item.kbank.toLocaleString(undefined, {minimumFractionDigits: 2}) : '-'}</td>
                        <td>${item.requester}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = htmlRows;
            document.getElementById('modalDateDisplay').innerText = 'ข้อมูลสรุปรายการทั้งหมด';
            document.getElementById('modalSumSCB').innerText = totalSCB.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('modalSumKBank').innerText = totalKBank.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('modalGrandTotal').innerText = (totalSCB + totalKBank).toLocaleString(undefined, {minimumFractionDigits: 2});
            modal.style.display = 'flex';
        }

        function closeModal(e) { if (e.target.id === 'reportModal') closeModalDirect(); }
        function closeModalDirect() { document.getElementById('reportModal').style.display = 'none'; }
    </script>
</body>
</html>
